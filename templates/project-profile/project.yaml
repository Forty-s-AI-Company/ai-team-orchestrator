project:
  name: example-project
  root: "."
  stage: development

repository:
  protected_branches:
    - main
    - master

commands:
  install: npm install
  lint: npm run lint
  typecheck: npm run typecheck
  test: npm run test
  build: npm run build

safety:
  allow_git_push: false
  allow_deploy: false
  allow_database_migration: false
  allow_database_seed: false
  allow_destructive_commands: false
  require_disposable_worktree_for_writes: true
