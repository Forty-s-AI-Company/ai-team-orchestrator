openhands:
  base_url: "http://127.0.0.1:31024"
  session_key_env: "SESSION_API_KEY"
  session_key_file: "%USERPROFILE%/.openhands/agent-canvas/api-key.txt"
  ready_path: "/ready"
  conversation_path: "/api/conversations"
  cancel_path_template: "/api/conversations/{task_id}/interrupt"
  timeout_seconds: 30
  host_workspace_root: "C:/Users/eden/Downloads/AI"
  container_workspace_root: "/projects"
  llm_model: "openai/gpt-5.5"
  llm_api_key_env: "OPENHANDS_LLM_API_KEY"
  llm_api_key: "placeholder-not-a-real-secret"
  max_retries: 2

handsfreecode:
  base_url: "http://127.0.0.1:31025"
  session_key_env: "HANDSFREECODE_SESSION_API_KEY"
  ready_path: "/ready"
  task_run_path: "/api/tasks/run"
  timeout_seconds: 30
  default_runtime_provider: "mock"

codex:
  executable: "codex"
  status_args: ["--version"]
  quota_args: ["doctor", "--json"]
  run_args: ["exec", "--sandbox", "read-only", "--skip-git-repo-check"]
  timeout_seconds: 45
  run_timeout_seconds: 180
  execution_enabled: true

antigravity:
  executable: "antigravity"
  status_args: ["auth", "status"]
  quota_args: ["quota"]
  run_args: []
  timeout_seconds: 45
  run_timeout_seconds: 180
  execution_enabled: false

workspace:
  allowlist:
    - "C:/Users/eden/Downloads/AI"
