openhands:
  base_url: "http://127.0.0.1:31024"
  session_key_env: "SESSION_API_KEY"
  session_key_file: "~/.openhands/agent-canvas/api-key.txt"
  ready_path: "/ready"
  conversation_path: "/api/conversations"
  cancel_path_template: "/api/conversations/{task_id}/interrupt"
  timeout_seconds: 30
  host_workspace_root: "/home/eden/projects"
  container_workspace_root: "/projects"
  llm_model: "openai/gpt-5.5"
  llm_api_key_env: "OPENHANDS_LLM_API_KEY"
  llm_api_key: "placeholder-not-a-real-secret"
  max_retries: 2

handsfreecode:
  base_url: "http://127.0.0.1:31025"
  session_key_env: "HANDSFREECODE_SESSION_API_KEY"
  session_key_file: "~/.handsfreecode/session-api-key.txt"
  ready_path: "/ready"
  task_run_path: "/api/tasks/run"
  timeout_seconds: 30
  default_runtime_provider: "ollama"
  allowed_models: ["qwen2.5-coder:7b"]
  # Ollama qwen2.5-coder:7b has no provider-native reasoning-effort switch.
  allowed_reasoning_efforts: ["default"]

codex:
  # Pin the audited WSL standalone binary. Do not resolve through Windows PATH,
  # Desktop bridges, or npm shims because their sandbox helpers differ.
  executable: "/home/eden/.local/bin/codex"
  status_args: ["login", "status"]
  quota_args: []
  run_args: ["exec", "--sandbox", "read-only", "--skip-git-repo-check"]
  # Trusted writes are allowed only after the isolated executor creates a
  # disposable linked worktree and applies allowed_write_paths + validation gates.
  # Trusted development runs are non-interactive. Approval is explicit while
  # the disposable worktree and deterministic validation remain the boundary.
  write_run_args: ["--ask-for-approval", "never", "exec", "--sandbox", "danger-full-access", "--skip-git-repo-check"]
  timeout_seconds: 45
  # High-reasoning write cycles need enough time to inspect, edit, and verify
  # a bounded diff; outer delivery limits still cap iterations and token use.
  run_timeout_seconds: 600
  execution_enabled: true
  # Exact names exposed by the installed WSL Codex CLI. Profiles may select
  # only these names and the four audited reasoning levels below.
  allowed_models:
    - "gpt-5.6-sol"
    - "gpt-5.6-terra"
    - "gpt-5.6-luna"
    - "gpt-5.5"
    - "gpt-5.4"
    - "gpt-5.4-mini"
    - "gpt-5.3-codex-spark"
  allowed_reasoning_efforts: ["low", "medium", "high", "xhigh"]

# The bounded delivery supervisor owns retry and fallback decisions for the
# Engineer.  Do not add a cross-provider write fallback here: all three routes
# remain the audited WSL Codex CLI in the same disposable worktree policy.
providers:
  codex_engineer:
    models:
      - name: "gpt-5.6-terra"
        reasoning: high
        priority: 100
      - name: "gpt-5.6-sol"
        reasoning: medium
        priority: 80
      - name: "gpt-5.6-luna"
        reasoning: medium
        priority: 60
    retry:
      max_attempts_per_model: 2
      initial_delay_seconds: 60
      multiplier: 2
      max_delay_seconds: 1800
      jitter_ratio: 0.15
    circuit_breaker:
      failure_threshold: 2
      cooldown_seconds: 1800
      max_cooldown_seconds: 14400
      probe_interval_seconds: 900
    budgets:
      max_task_provider_attempts: 8
      max_provider_probes_per_hour: 4

# Optional local recorder configuration.  With no command configured the
# supervisor writes deterministic, redacted resume packets only.  It may never
# write a product repository, run tests, create commits, or generate code.
local_continuity:
  enabled: true
  mode: recorder_only
  timeout_seconds: 180
  max_output_tokens: 2000
  allow_repository_writes: false
  allow_git_writes: false
  allow_test_execution: false
  allow_code_generation: false
  deterministic_fallback: true

antigravity:
  # Pin the audited WSL-native CLI and use an authenticated command for doctor.
  executable: "/home/eden/.local/bin/agy"
  status_args: ["models"]
  quota_args: []
  run_args: ["--model", "Gemini 3.5 Flash (Low)", "--print-timeout", "30s", "--mode", "plan", "--sandbox", "--print"]
  timeout_seconds: 20
  run_timeout_seconds: 40
  execution_enabled: true
  # Bounded delivery preserves complete trusted instructions and fails closed
  # when task scope plus mandatory policy evidence exceeds this hard cap.
  prompt_max_chars: 8192
  diagnostics_cache_ttl_seconds: 30
  # All bounded Antigravity PM/architect/QA/review stages run with the repo
  # read-only. The CLI may persist only ephemeral state under /tmp.
  read_only_sandbox_executable: "/usr/bin/bwrap"
  # Exact account-visible names returned by `agy models` in WSL.
  allowed_models:
    - "Gemini 3.5 Flash (Low)"
    - "Gemini 3.5 Flash (Medium)"
    - "Gemini 3.5 Flash (High)"
    - "Gemini 3.1 Pro (Low)"
    - "Gemini 3.1 Pro (High)"
    - "GPT-OSS 120B (Medium)"
  allowed_reasoning_efforts: ["low", "medium", "high", "thinking"]

routing:
  # Role profiles are deliberately explicit. Automatic routes never include
  # OpenHands or mock, and write workflows never cross-provider fallback.
  roles:
    product-manager:
      primary:
        provider: antigravity
        model: "Gemini 3.5 Flash (High)"
        reasoning_effort: high
      fallbacks:
        - provider: codex
          model: "gpt-5.6-terra"
          reasoning_effort: medium
      allow_write: false

    architect:
      primary:
        provider: antigravity
        model: "Gemini 3.1 Pro (High)"
        reasoning_effort: high
      fallbacks:
        - provider: codex
          model: "gpt-5.6-sol"
          reasoning_effort: high
      secondary:
        provider: codex
        model: "gpt-5.6-sol"
        reasoning_effort: high
      allow_write: false

    engineer:
      primary:
        provider: codex
        model: "gpt-5.6-terra"
        reasoning_effort: high
      # These are only selected by the persistent bounded delivery circuit
      # breaker; RoleRouter never auto-switches a write workflow itself.
      fallbacks:
        - provider: codex
          model: "gpt-5.6-sol"
          reasoning_effort: medium
        - provider: codex
          model: "gpt-5.6-luna"
          reasoning_effort: medium
      allow_write: true

    reviewer:
      primary:
        provider: codex
        model: "gpt-5.6-sol"
        reasoning_effort: xhigh
      fallbacks: []
      secondary:
        provider: antigravity
        model: "Gemini 3.1 Pro (High)"
        reasoning_effort: high
      allow_write: false

    qa-engineer:
      primary:
        provider: handsfreecode
        model: "qwen2.5-coder:7b"
        reasoning_effort: default
      fallbacks: []
      allow_write: false
      allow_read_only_agent: true

    # Bounded delivery QA requires two independent provider-native reviews.
    delivery-qa:
      primary:
        provider: antigravity
        model: "Gemini 3.1 Pro (High)"
        reasoning_effort: high
      fallbacks: []
      secondary:
        provider: codex
        model: "gpt-5.6-sol"
        reasoning_effort: xhigh
      allow_write: false

    project-analyst:
      primary:
        provider: handsfreecode
        model: "qwen2.5-coder:7b"
        reasoning_effort: default
      fallbacks: []
      allow_write: false
      allow_read_only_agent: true

workspace:
  allowlist:
    - "/home/eden/projects"

# Explicit opt-in for fast, recoverable development. Production deployment,
# production migrations, real payments, and destructive actions stay closed
# by the product profile and are never enabled by this section.
trusted_dev_autopilot:
  enabled_projects:
    - "/home/eden/projects/CelebrateDeal"
  min_iterations: 6
  min_repair_attempts: 4
  min_token_usage: 360000
  min_stage_timeout_seconds: 1200
  checkpoint_on_validation_failure: true
  preserve_dependency_tree: true
  cleanup_worktree_after_merge: true
  test_database:
    enabled: true
    url_env: "AI_TEAM_TEST_DATABASE_URL"
    allowed_hosts: ["localhost", "127.0.0.1", "::1"]
    required_database_suffixes: ["_dev", "_test"]
    bootstrap_commands:
      - "npm run db:migrate:deploy"
